pre-commit:
  commands:
    gitleaks:
      run: gitleaks protect --staged --no-banner
      fail_text: "Secrets detected! Remove before committing."
    merge-conflicts:
      run: git diff --cached --name-only --diff-filter=ACM | xargs grep -lE '<{7} |={7} |>{7} ' && exit 1 || exit 0
      fail_text: "Merge conflict markers found in staged files."
    large-files:
      run: |
        for file in $(git diff --cached --name-only --diff-filter=ACM); do
          if [ -f "$file" ] && [ "$(wc -c < "$file")" -gt 1048576 ]; then
            echo "$file is larger than 1MB"
            exit 1
          fi
        done
      fail_text: "Large file detected (>1MB)."
    private-keys:
      run: git diff --cached --name-only --diff-filter=ACM | xargs grep -lE 'PRIV''ATE KEY' && exit 1 || exit 0
      fail_text: "Private key found in staged files."
    typecheck:
      run: pnpm run typecheck
    eslint:
      run: pnpm run lint
